services:
  jekyll:
    image: amirpourmand/al-folio
    working_dir: /srv/jekyll
    command: bash -lc "bundle install && bundle exec jekyll serve --watch --port=8080 --host=0.0.0.0 --livereload --verbose"
    ports:
      - "8080:8080"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll